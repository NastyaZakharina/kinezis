name: Generate Feeds and Product Pages

on:
  push:
    branches: [main]
    paths:
      - 'data.js'
      - 'scripts/generate-feed.js'
      - 'scripts/generate-merchant-feed.js'
      - 'scripts/generate-product-pages.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate feeds and product pages
        run: |
          node scripts/generate-feed.js
          node scripts/generate-merchant-feed.js
          node scripts/generate-product-pages.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hotline.xml merchant.xml products/
          git diff --cached --quiet || git commit -m "Auto-update feeds and product pages [skip ci]"
          git push

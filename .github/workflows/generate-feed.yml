name: Generate Hotline XML Feed

on:
  push:
    branches: [main]
    paths:
      - 'data.js'
      - 'scripts/generate-feed.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate hotline.xml
        run: node scripts/generate-feed.js

      - name: Commit hotline.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hotline.xml
          git diff --cached --quiet || git commit -m "Auto-update hotline.xml feed [skip ci]"
          git push

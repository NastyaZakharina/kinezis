<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Вхід — Кінезіс</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="logo.png" type="image/png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Unbounded:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: var(--bg-tint); }
.auth-card { background: #fff; border-radius: 24px; padding: 40px; width: 100%; max-width: 440px; box-shadow: var(--shadow-md); }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo img { height: 48px; }
.auth-logo-text { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; color: var(--teal); }
.auth-tabs { display: flex; gap: 0; background: var(--bg-tint); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
.auth-tab { flex: 1; padding: 10px; text-align: center; border: none; background: none; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all .2s; }
.auth-tab.active { background: #fff; color: var(--teal); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.auth-input { padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s; width: 100%; }
.auth-input:focus { border-color: var(--teal); }
.auth-btn { padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .2s; }
.auth-btn--primary { background: var(--teal); color: #fff; }
.auth-btn--primary:hover { background: var(--teal-dark); }
.auth-btn--google { background: #fff; color: var(--dark); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; }
.auth-btn--google:hover { background: var(--bg-tint); }
.auth-divider { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.auth-error { background: #fee2e2; color: #dc2626; border-radius: 10px; padding: 10px 14px; font-size: 13px; display: none; }
.auth-error.show { display: block; }
.auth-back { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
.auth-back a { color: var(--teal); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MN3MS74H" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/"><span class="auth-logo-text">Кінезіс</span></a>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Вхід</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Реєстрація</button>
    </div>

    <!-- Login form -->
    <div id="loginForm">
      <div class="auth-form">
        <div id="loginError" class="auth-error"></div>
        <input class="auth-input" type="email" id="loginEmail" placeholder="Email" autocomplete="email"/>
        <input class="auth-input" type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password"/>
        <button class="auth-btn auth-btn--primary" onclick="loginEmail()">Увійти</button>
        <div style="text-align:right;margin-top:-4px"><button onclick="resetPassword()" style="border:none;background:none;color:var(--teal);font-size:13px;cursor:pointer;font-family:inherit;padding:0">Забули пароль?</button></div>
        <div class="auth-divider">або</div>
        <button class="auth-btn auth-btn--google" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Увійти через Google
        </button>
      </div>
    </div>

    <!-- Register form -->
    <div id="registerForm" style="display:none">
      <div class="auth-form">
        <div id="registerError" class="auth-error"></div>
        <input class="auth-input" type="text" id="regName" placeholder="Ваше ім'я" autocomplete="name"/>
        <input class="auth-input" type="tel" id="regPhone" placeholder="+38 0__ ___ __ __" autocomplete="tel"/>
        <input class="auth-input" type="email" id="regEmail" placeholder="Email" autocomplete="email"/>
        <input class="auth-input" type="password" id="regPassword" placeholder="Пароль (мін. 6 символів)" autocomplete="new-password"/>
        <button class="auth-btn auth-btn--primary" onclick="registerEmail()">Зареєструватись</button>
        <div class="auth-divider">або</div>
        <button class="auth-btn auth-btn--google" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Зареєструватись через Google
        </button>
      </div>
    </div>

    <div class="auth-back"><a href="/">← На головну</a></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { FIREBASE_CONFIG } from './firebase-config.js';

  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let registering = false;

  // Redirect if already logged in
  onAuthStateChanged(auth, user => {
    if (user && !registering) {
      const next = new URLSearchParams(location.search).get('next') || 'cabinet.html';
      window.location.href = next;
    }
  });

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideErrors() {
    document.querySelectorAll('.auth-error').forEach(e => e.classList.remove('show'));
  }

  async function ensureUserDoc(user, extra) {
    const ref = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        name: extra?.name || user.displayName || '',
        phone: extra?.phone || '',
        email: user.email,
        points: 0,
        createdAt: serverTimestamp(),
      });
    }
  }

  window.switchTab = function(tab) {
    hideErrors();
    if (tab === 'login') {
      document.getElementById('loginForm').style.display = '';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('tabRegister').classList.remove('active');
    } else {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = '';
      document.getElementById('tabLogin').classList.remove('active');
      document.getElementById('tabRegister').classList.add('active');
    }
  };

  window.loginEmail = async function() {
    hideErrors();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    if (!email || !pass) return showError('loginError', 'Заповніть всі поля');
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      const msgs = { 'auth/user-not-found': 'Користувача не знайдено', 'auth/wrong-password': 'Невірний пароль', 'auth/invalid-email': 'Невірний email', 'auth/invalid-credential': 'Невірний email або пароль' };
      showError('loginError', msgs[e.code] || 'Помилка входу');
    }
  };

  window.registerEmail = async function() {
    hideErrors();
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    if (!name || !email || !pass) return showError('registerError', 'Заповніть обов\'язкові поля');
    if (pass.length < 6) return showError('registerError', 'Пароль мінімум 6 символів');
    registering = true;
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await ensureUserDoc(cred.user, { name, phone });
      await fetch('https://kinezis-bot.nastiazaharina.workers.dev/register-notify', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, email }),
        keepalive: true
      }).catch(() => {});
      const next = new URLSearchParams(location.search).get('next') || 'cabinet.html';
      window.location.href = next;
    } catch(e) {
      registering = false;
      const msgs = { 'auth/email-already-in-use': 'Цей email вже використовується', 'auth/invalid-email': 'Невірний email' };
      showError('registerError', msgs[e.code] || 'Помилка реєстрації');
    }
  };

  window.resetPassword = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) return showError('loginError', 'Введіть email для скидання пароля');
    try {
      const { sendPasswordResetEmail } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      await sendPasswordResetEmail(auth, email);
      const el = document.getElementById('loginError');
      el.style.background = '#d1fae5'; el.style.color = '#065f46';
      el.textContent = '✅ Лист зі скиданням пароля надіслано на ' + email;
      el.classList.add('show');
    } catch(e) {
      showError('loginError', 'Email не знайдено або невірний формат');
    }
  };

  window.loginGoogle = async function() {
    hideErrors();
    try {
      const cred = await signInWithPopup(auth, provider);
      await ensureUserDoc(cred.user);
    } catch(e) {
      showError('loginError', 'Помилка входу через Google');
    }
  };
</script>
</body>
</html>
